<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>K&S의 여행 스토리</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="loading">
        <div class="spinner"></div>
        <div id="loadingText" style="font-weight:800; color:#2D9CDB;">데이터 분석 중...</div>
    </div>

    <header class="app-header">
        <h1 id="header-title">K&S 여행 스토리</h1>
        <div class="header-actions">
            <button class="icon-btn" onclick="fetchServerData()"><i class="fa-solid fa-rotate-right"></i></button>
        </div>
    </header>

    <main id="app-main">
        <section id="tab-home" class="tab-content active">
            <div class="welcome-banner">
                <h2>데이터 기반 최적화<br>맞춤형 여행 설계 ✈️</h2>
                <p>구글 시트 라이브러리와 AI가 결합된 최신 정보를 제공합니다.</p>
            </div>

            <div id="weather-info-card" class="weather-card" style="display: none;"></div>

            <div class="card setup-card">
                <h3>기본 여행 설정</h3>
                
                <div class="input-group">
                    <label>🌍 상세 여행 목적지</label>
                    <input type="text" id="travel-location" placeholder="예: 일본 오사카" onchange="updateWeatherInfo()">
                </div>

                <div class="input-group">
                    <label>👨‍👩‍👧‍👦 여행 구성원 (세분화)</label>
                    <select id="travel-type">
                        <option value="">구성원을 선택해주세요</option>
                        <option value="혼자">혼자</option>
                        <option value="연인">연인</option>
                        <option value="친구들">친구들</option>
                        <option value="2030부부">20~30대 부부</option>
                        <option value="4050부부">40~50대 부부</option>
                        <option value="60부부">60대 이상 부부</option>
                        <option value="가족_성인">성인 자녀 동반 4인 이상 가족</option>
                        <option value="가족_청소년">청소년 이하 자녀 포함 가족</option>
                    </select>
                </div>

                <div class="input-group row-group">
                    <div class="half-input">
                        <label>👥 총 인원 수</label>
                        <input type="number" id="travel-members" placeholder="명">
                    </div>
                    <div class="half-input">
                        <label>💰 예산 범위 (원)</label>
                        <input type="number" id="travel-budget" placeholder="예: 2000000">
                    </div>
                </div>

                <div class="input-group">
                    <label>📅 여행 기간 선택</label>
                    <input type="text" id="travel-dates" placeholder="시작일 ~ 종료일 선택" readonly>
                </div>

                <div class="input-group">
                    <label>📍 여행 테마</label>
                    <select id="travel-destination">
                        <option value="">테마를 선택해주세요</option>
                        <option value="relax">휴양 (호캉스, 스파)</option>
                        <option value="tour">관광 (명소, 랜드마크)</option>
                        <option value="food">맛집 탐방 (로컬 푸드)</option>
                        <option value="activity">액티비티 (스포츠, 체험)</option>
                    </select>
                </div>

                <div class="input-group">
                    <label>🏨 예약한 숙소 정보</label>
                    <div style="display: flex; gap: 6px;">
                        <input type="text" id="travel-accommodation" placeholder="숙소 이름 또는 위치" style="flex: 1;">
                        <button class="secondary-btn" style="width: auto; padding: 0 12px; background:#fff0f3; color:#ff4757;" onclick="recommendHotels()">AI 추천</button>
                    </div>
                    <div id="hotel-recommend-box" style="margin-top:10px; display:none;"></div>
                </div>

                <div class="input-group">
                    <label>⏰ 출발 시간 & 기타 요청</label>
                    <div style="display: flex; gap: 6px; margin-bottom: 8px;">
                        <input type="time" id="travel-departure" style="flex: 1;">
                        <span style="align-self: center; font-size: 12px; color: var(--text-sub);">출발 기준</span>
                    </div>
                    <textarea id="travel-requests" placeholder="특별히 고려해야 할 사항을 적어주세요." rows="2"></textarea>
                </div>

                <input type="hidden" id="travel-days" value="">
                <button class="primary-btn" onclick="generatePlan()">✨ 최신 데이터로 일정 확인하기</button>
            </div>
        </section>

        <section id="tab-schedule" class="tab-content">
            <div class="section-header">
                <h2>📅 데일리 코스</h2>
                <div id="saved-plans-list" class="plan-list-box"></div>
            </div>
            <div id="tips-food-container" style="display: none; margin-bottom: 25px;"></div>
            <div id="schedule-container">
                <div style="text-align: center; color: var(--text-sub); padding: 50px 0;">아직 데이터가 없습니다.</div>
            </div>
        </section>

        </main>

    <nav class="bottom-nav">
        <button class="nav-item active" onclick="switchTab('tab-home', this)"><i class="fa-solid fa-house"></i><span>설정</span></button>
        <button class="nav-item" onclick="switchTab('tab-schedule', this)"><i class="fa-regular fa-calendar-check"></i><span>일정</span></button>
        <button class="nav-item"><i class="fa-solid fa-calculator"></i><span>예산</span></button>
        <button class="nav-item"><i class="fa-solid fa-suitcase"></i><span>준비물</span></button>
        <button class="nav-item"><i class="fa-solid fa-map-location-dot"></i><span>명소</span></button>
    </nav>

    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/ko.js"></script>
    <script src="app.js"></script>
</body>
</html>
