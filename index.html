<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>K&S의 여행 스토리</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        :root {
            --primary: #6366f1; --primary-dark: #4f46e5; --secondary: #a855f7; 
            --bg-color: #f8fafc; --card-bg: #ffffff; --text-main: #1e293b; --text-sub: #64748b; --border-color: #e2e8f0;
        }
        body { background-color: var(--bg-color); color: var(--text-main); font-family: 'Pretendard', sans-serif; margin: 0; }
        
        section { padding: 16px; box-sizing: border-box; }
        .card { 
            background: var(--card-bg); border-radius: 16px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.03); border: 1px solid rgba(0,0,0,0.02); 
            padding: 20px; box-sizing: border-box; width: 100%; margin-bottom: 16px;
        }
        .section-header h2, .card h3 { color: var(--primary-dark); font-weight: 800; margin-bottom: 12px; margin-top: 0; }
        
        input, select, textarea { 
            width: 100%; box-sizing: border-box; border: 1px solid var(--border-color); 
            border-radius: 12px; padding: 12px; background: #f8fafc; 
            font-size: 14px; outline: none; transition: all 0.2s; margin-top: 6px;
        }

        .btn-base {
            border: none; border-radius: 10px; font-weight: 700; cursor: pointer;
            display: flex; align-items: center; justify-content: center; white-space: nowrap; box-sizing: border-box;
        }
        .primary-btn { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; box-shadow: 0 4px 12px rgba(99, 102, 241, 0.25); }
        .secondary-btn { background: #f1f5f9; color: #475569; }
        
        .mini-btn { height: 40px !important; min-height: 40px !important; font-size: 13px !important; padding: 0 12px !important; }
        .mini-btn.blue { background: #e0e7ff !important; color: var(--primary) !important; }
        .mini-btn.gray { background: #f1f5f9 !important; color: #475569 !important; }
        .mini-btn.red { background: #fee2e2 !important; color: #ef4444 !important; }

        .app-header { background: rgba(255,255,255,0.85); backdrop-filter: blur(12px); padding: 15px; }
        #header-title { color: var(--primary-dark); font-weight: 800; background: linear-gradient(135deg, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 0; font-size: 20px; }
        .bottom-nav .nav-item.active { color: var(--primary); font-weight: 700; }

        /* 대시보드 스타일 추가 */
        #dashboard-container { display: none; }
        .dday-badge { background: #ef4444; color: white; padding: 4px 12px; border-radius: 20px; font-weight: 800; font-size: 14px; display: inline-block; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div id="loading"><div class="spinner"></div><div id="loadingText" style="font-weight:800; color:var(--primary);">데이터 처리 중...</div></div>
    
    <header class="app-header">
        <h1 id="header-title">K&S 스마트 트래블</h1>
        <div class="header-actions"><button onclick="fetchServerData()" style="border:none; background:none; color:var(--text-sub);"><i class="fa-solid fa-rotate-right"></i></button></div>
    </header>
    
    <main id="app-main" style="padding-bottom: 80px;">
        <section id="tab-home" class="tab-content active">
            
            <div id="dashboard-container">
                <div class="card" style="background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; text-align: center; padding: 30px 20px;">
                    <div id="dash-dday" class="dday-badge">D-DAY 계산중</div>
                    <h2 id="dash-title" style="margin: 10px 0; font-size: 24px; font-weight: 800;">방콕 5일 여행</h2>
                    <p id="dash-desc" style="margin: 0; opacity: 0.9; font-size: 14px;">설레는 여행이 곧 시작됩니다!</p>
                    <button class="btn-base" onclick="toggleSetupMode()" style="margin: 20px auto 0; background: rgba(255,255,255,0.2); color: white; height: 36px; padding: 0 16px; font-size: 13px;">여행 설정 수정하기</button>
                </div>
            </div>

            <div id="setup-container">
                <div class="welcome-banner" style="background: linear-gradient(135deg, var(--primary), var(--secondary)); border-radius: 16px; margin-bottom: 16px; padding: 24px; color: white;">
                    <h2 style="color:white; margin:0 0 8px 0; font-size: 22px;">맞춤형 여행 설계 ✈️</h2>
                    <p style="margin:0; opacity: 0.9;">우리만의 여행 라이브러리 기반 플래너</p>
                </div>
                
                <div class="card setup-card">
                    <h3>기본 여행 설정</h3>
                    <div class="input-group" style="margin-bottom: 16px;">
                        <label style="font-weight: 700; font-size: 13px;">🌍 여행 목적지</label>
                        <input type="text" id="travel-location" placeholder="예: 방콕" onchange="updateWeatherAndCurrency()">
                    </div>
                    
                    <div class="input-group" style="margin-bottom: 16px;">
                        <label style="font-weight: 700; font-size: 13px;">👨‍👩‍👧‍👦 구성원</label>
                        <select id="travel-type">
                            <option value="">구성원 선택</option>
                            <option value="혼자">혼자</option><option value="친구">친구</option><option value="연인">연인</option>
                            <option value="2030부부">20~30대 부부</option><option value="4050부부">40~50대 부부</option>
                            <option value="가족_청소년">가족(청소년 자녀)</option><option value="가족_성인">가족(성인 자녀)</option>
                        </select>
                    </div>
                    
                    <div style="display: flex; gap: 12px; margin-bottom: 16px;">
                        <div style="flex: 1;">
                            <label style="font-weight: 700; font-size: 13px;">👥 총 인원</label>
                            <input type="number" id="travel-members" placeholder="명" style="text-align: right;">
                        </div>
                        <div style="flex: 1;">
                            <label style="font-weight: 700; font-size: 13px;">💰 총 예산(원)</label>
                            <input type="number" id="travel-budget" placeholder="0">
                        </div>
                    </div>
                    
                    <div class="input-group" style="margin-bottom: 16px;">
                        <label style="font-weight: 700; font-size: 13px;">📅 여행 기간</label>
                        <input type="text" id="travel-dates" placeholder="날짜 선택" readonly style="background:#fff;">
                    </div>

                    <div class="input-group" style="margin-bottom: 16px;">
                        <label style="font-weight: 700; font-size: 13px;">📍 주요 테마</label>
                        <select id="travel-destination">
                            <option value="default">테마를 선택해주세요</option>
                            <option value="relax">휴양 (호캉스, 스파)</option><option value="tour">관광 (명소, 랜드마크)</option>
                            <option value="food">맛집 탐방 (로컬 푸드)</option><option value="activity">액티비티 (스포츠, 체험)</option>
                        </select>
                    </div>
                    
                    <input type="hidden" id="travel-days" value="">
                    
                    <div style="display: flex; gap: 10px; width: 100%; height: 50px; margin-top: 20px;">
                        <button class="btn-base primary-btn" onclick="generatePlan()" style="flex: 1; height: 100%; font-size: 15px;">✨ 일정 생성 (DB 연동)</button>
                        <button class="btn-base secondary-btn" onclick="resetApp()" style="flex: 0 0 80px; height: 100%; font-size: 13px;">초기화</button>
                    </div>
                </div>
            </div>
            <div id="weather-info-card" class="weather-card" style="display: none; background: var(--primary-dark); border-radius: 16px; margin-top: 16px; padding: 16px; color:white;"></div>
        </section>

        <section id="tab-schedule" class="tab-content">
            <div class="section-header">
                <h2>📅 스마트 데일리 코스</h2>
                <div style="display: flex; gap: 6px; margin-bottom: 20px; width: 100%;">
                    <button class="btn-base mini-btn blue" onclick="promptSavePlan()" style="flex:1;"><i class="fa-solid fa-floppy-disk" style="margin-right:4px;"></i>저장</button>
                    <button class="btn-base mini-btn gray" onclick="toggleSavedPlans()" style="flex:1;"><i class="fa-solid fa-folder-open" style="margin-right:4px;"></i>보관함</button>
                    <button class="btn-base mini-btn red" onclick="resetScheduleScreen()" style="flex:1;"><i class="fa-solid fa-eraser" style="margin-right:4px;"></i>비우기</button>
                </div>
                <div id="saved-plans-list" class="plan-list-box"></div>
            </div>
            <div id="tips-food-container" style="display: none; margin-bottom: 25px;"></div>
            <div id="schedule-container">
                <div style="text-align: center; padding: 60px 0; color: var(--text-sub); font-size: 14px;">설정 탭에서 일정을 생성해주세요.</div>
            </div>
        </section>

        <section id="tab-budget" class="tab-content">
            <div class="section-header"><h2>💸 지출 및 정산 관리</h2></div>
            <div class="budget-summary card" style="background: linear-gradient(135deg, var(--primary), var(--secondary)); color:white; margin-bottom: 12px;">
                <div class="budget-row"><span>총 예산</span><strong id="display-budget">0 원</strong></div>
                <div class="budget-row"><span>총 사용 금액</span><strong id="used-budget">0 원</strong></div>
                <div class="budget-row total" style="border-top:1px solid rgba(255,255,255,0.2); padding-top:10px;"><span>남은 예산</span><strong id="remaining-budget">0 원</strong></div>
            </div>
            
            <div class="card" style="background: #e0e7ff; border: none; margin-bottom: 16px; padding: 16px;">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <div style="font-weight: 800; color: var(--primary-dark); font-size: 14px;"><i class="fa-solid fa-calculator"></i> 1인당 예상 정산 금액</div>
                    <div id="dutch-pay-amount" style="font-weight: 800; font-size: 18px; color: var(--primary-dark);">0 원</div>
                </div>
                <div id="dutch-pay-desc" style="font-size: 12px; color: var(--text-sub); margin-top: 4px; text-align: right;">인원수를 입력해주세요.</div>
            </div>

            <div class="card">
                <h3>지출 추가</h3>
                <input type="text" id="expense-name" placeholder="사용 내역 입력 (예: 점심 식사)">
                <div style="display:flex; gap:10px; margin: 10px 0;">
                    <input type="number" id="expense-amount" placeholder="금액" style="flex:2;">
                    <select id="expense-currency" style="flex:1;">
                        <option value="KRW">KRW</option><option value="THB">THB</option><option value="JPY">JPY</option><option value="USD">USD</option>
                    </select>
                </div>
                <button class="btn-base primary-btn" onclick="addExpense()" style="height: 45px; width: 100%;">기록하기</button>
            </div>
            <div class="card" id="expense-history" style="display: none;"><div id="expense-list-content"></div></div>
        </section>

        <section id="tab-pack" class="tab-content">
            <div class="section-header"><h2>🎒 스마트 준비물</h2></div>
            <div class="card" id="pack-container">
                <div id="pack-add-box" style="display: flex; gap: 8px;">
                    <input type="text" id="pack-input" placeholder="추가할 준비물 입력" style="margin:0; height: 42px;">
                    <button onclick="addPackItem()" class="btn-base primary-btn" style="width: 42px; height: 42px; padding:0;"><i class="fa-solid fa-plus"></i></button>
                </div>
            </div>
            <button class="btn-base primary-btn" onclick="syncPackData()" style="height: 50px;">서버 동기화</button>
        </section>

        <section id="tab-spots" class="tab-content">
            <div class="section-header"><h2>📸 갤러리 보관함</h2></div>
            <div id="spots-container"></div>
            <button class="btn-base primary-btn" onclick="document.getElementById('camera-input').click()" style="margin: 20px 0; height: 50px; width: 100%;"><i class="fa-solid fa-camera" style="margin-right:8px;"></i>사진 추가하기</button>
            <input type="file" id="camera-input" accept="image/*" capture="environment" style="display: none;" onchange="handlePhotoUpload(event)">
            <div id="photo-gallery" class="photo-grid"></div>
        </section>
    </main>

    <nav class="bottom-nav">
        <button class="nav-item active" onclick="switchTab('tab-home', this)"><i class="fa-solid fa-house"></i><span>홈</span></button>
        <button class="nav-item" onclick="switchTab('tab-schedule', this)"><i class="fa-regular fa-calendar-check"></i><span>일정</span></button>
        <button class="nav-item" onclick="switchTab('tab-budget', this)"><i class="fa-solid fa-calculator"></i><span>정산</span></button>
        <button class="nav-item" onclick="switchTab('tab-pack', this)"><i class="fa-solid fa-suitcase"></i><span>준비물</span></button>
        <button class="nav-item" onclick="switchTab('tab-spots', this)"><i class="fa-solid fa-image"></i><span>갤러리</span></button>
    </nav>

    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/ko.js"></script>
    <script src="app.js"></script>
</body>
</html>
