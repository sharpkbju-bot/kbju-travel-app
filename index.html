<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>K&S의 여행 스토리</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        :root {
            --primary: #6366f1; --primary-dark: #4f46e5; --secondary: #a855f7; 
            --bg-color: #f8fafc; --card-bg: #ffffff; --text-main: #1e293b; --text-sub: #64748b; --border-color: #e2e8f0;
        }
        body { background-color: var(--bg-color); color: var(--text-main); font-family: 'Pretendard', sans-serif; margin: 0; }
        
        /* 레이아웃 기본 */
        section { padding: 16px; box-sizing: border-box; }
        .card { 
            background: var(--card-bg); border-radius: 16px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.03); border: 1px solid rgba(0,0,0,0.02); 
            padding: 20px; box-sizing: border-box; width: 100%; margin-bottom: 16px;
        }
        .section-header h2, .card h3 { color: var(--primary-dark); font-weight: 800; margin-bottom: 12px; margin-top: 0; }
        
        input, select, textarea { 
            width: 100%; box-sizing: border-box; border: 1px solid var(--border-color); 
            border-radius: 12px; padding: 12px; background: #f8fafc; 
            font-size: 14px; outline: none; transition: all 0.2s; margin-top: 6px;
        }

        /* 버튼 스타일 시스템화 */
        .btn-base {
            border: none; border-radius: 10px; font-weight: 700; cursor: pointer;
            display: flex; align-items: center; justify-content: center; white-space: nowrap;
            box-sizing: border-box;
        }
        
        /* 메인 큰 버튼 (생성/동기화) */
        .primary-btn { 
            background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; 
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.25);
        }
        
        .secondary-btn { background: #f1f5f9; color: #475569; }
        
        /* 미니 버튼 (맵 검색, 저장, 초기화 전용) */
        .mini-btn {
            height: 40px !important; min-height: 40px !important; width: 85px !important;
            font-size: 13px !important; padding: 0 !important; flex-shrink: 0 !important; margin: 0 !important;
        }
        .mini-btn.blue { background: #e0e7ff !important; color: var(--primary) !important; }
        .mini-btn.gray { background: #f1f5f9 !important; color: #475569 !important; }
        .mini-btn.red { background: #fee2e2 !important; color: #ef4444 !important; }
        .tab-btn { width: 100% !important; flex: 1; }

        .app-header { background: rgba(255,255,255,0.85); backdrop-filter: blur(12px); padding: 15px; }
        #header-title { color: var(--primary-dark); font-weight: 800; background: linear-gradient(135deg, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 0; font-size: 20px; }
        .bottom-nav .nav-item.active { color: var(--primary); font-weight: 700; }

        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 9999;
            display: none; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box;
        }
        .modal-content { background: #fff; border-radius: 20px; width: 100%; max-width: 400px; padding: 24px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
    </style>
</head>
<body>
    <div id="loading"><div class="spinner"></div><div id="loadingText" style="font-weight:800; color:var(--primary);">데이터 불러오는 중...</div></div>
    
    <header class="app-header">
        <h1 id="header-title">K&S 여행 스토리</h1>
        <div class="header-actions"><button onclick="fetchServerData()" style="border:none; background:none; color:var(--text-sub);"><i class="fa-solid fa-rotate-right"></i></button></div>
    </header>
    
    <main id="app-main" style="padding-bottom: 80px;">
        <section id="tab-home" class="tab-content active">
            <div class="welcome-banner" style="background: linear-gradient(135deg, var(--primary), var(--secondary)); border-radius: 16px; margin-bottom: 16px; padding: 24px; color: white;">
                <h2 style="color:white; margin:0 0 8px 0; font-size: 22px;">맞춤형 여행 설계 ✈️</h2>
                <p style="margin:0; opacity: 0.9;">우리만의 여행 라이브러리 기반 플래너</p>
            </div>
            
            <div class="card" onclick="document.getElementById('guide-modal').style.display='flex'" style="background: linear-gradient(to right, #e0e7ff, #f3e8ff); cursor: pointer; display: flex; align-items: center; justify-content: space-between; padding: 18px;">
                <div style="font-weight: 800; color: var(--primary-dark);"><i class="fa-solid fa-book-open" style="margin-right: 8px;"></i> 새로운 여행지 추가 절차</div>
                <i class="fa-solid fa-chevron-right"></i>
            </div>

            <div id="weather-info-card" class="weather-card" style="display: none; background: var(--primary-dark); border-radius: 16px; margin-bottom: 16px; padding: 16px; color:white;"></div>
            
            <div class="card setup-card">
                <h3>기본 여행 설정</h3>
                <div class="input-group" style="margin-bottom: 16px;">
                    <label style="font-weight: 700; font-size: 13px;">🌍 여행 목적지</label>
                    <input type="text" id="travel-location" placeholder="예: 방콕" onchange="updateWeatherAndCurrency()">
                </div>
                
                <div class="input-group" style="margin-bottom: 16px;">
                    <label style="font-weight: 700; font-size: 13px;">👨‍👩‍👧‍👦 구성원</label>
                    <select id="travel-type">
                        <option value="">구성원 선택</option>
                        <option value="혼자">혼자</option>
                        <option value="친구">친구</option>
                        <option value="연인">연인</option>
                        <option value="2030부부">20~30대 부부</option>
                        <option value="4050부부">40~50대 부부</option>
                        <option value="가족_청소년">가족(청소년 이하 자녀 포함)</option>
                        <option value="가족_성인">가족(성인 자녀 포함)</option>
                    </select>
                </div>
                
                <div style="display: flex; gap: 12px; margin-bottom: 16px;">
                    <div style="flex: 1;">
                        <label style="font-weight: 700; font-size: 13px;">👥 인원</label>
                        <div style="position: relative;"><input type="number" id="travel-members" style="text-align: right; padding-right: 35px;"><span style="position: absolute; right: 12px; top: 20px; font-size: 13px; color: var(--text-sub);">명</span></div>
                    </div>
                    <div style="flex: 1;">
                        <label style="font-weight: 700; font-size: 13px;">💰 예산(원)</label>
                        <input type="number" id="travel-budget" placeholder="0">
                    </div>
                </div>
                
                <div class="input-group" style="margin-bottom: 16px;">
                    <label style="font-weight: 700; font-size: 13px;">📅 기간</label>
                    <input type="text" id="travel-dates" placeholder="날짜 선택" readonly style="background:#fff;">
                </div>
                
                <div class="input-group" style="margin-bottom: 20px;">
                    <label style="font-weight: 700; font-size: 13px;">🏨 숙소 정보</label>
                    <div style="display: flex; gap: 8px; margin-top: 6px; align-items: center; width: 100%;">
                        <input type="text" id="travel-accommodation" placeholder="숙소명 입력" style="flex: 1 !important; min-width: 0 !important; margin: 0 !important; height: 40px !important; border-radius: 10px; font-size: 13px;">
                        <button class="btn-base mini-btn blue" onclick="searchGoogleMapsHotel()">
                            <i class="fa-solid fa-map-location-dot" style="margin-right:4px;"></i>맵 검색
                        </button>
                    </div>
                </div>
                
                <div class="input-group" style="margin-bottom: 20px;">
                    <label style="font-weight: 700; font-size: 13px;">⏰ 출발 시간 & 추가요청</label>
                    <input type="time" id="travel-departure" style="margin-bottom: 8px;">
                    <input type="text" id="travel-requests" placeholder="예: 부모님 동반, 걷기 편한 코스">
                </div>
                
                <input type="hidden" id="travel-days" value="">
                
                <div style="display: flex; gap: 10px; width: 100%; height: 50px;">
                    <button class="btn-base primary-btn" onclick="generatePlan()" style="flex: 1; height: 100%; font-size: 15px; margin: 0;">✨ 일정 생성</button>
                    <button class="btn-base secondary-btn" onclick="resetApp()" style="flex: 0 0 100px; height: 100%; font-size: 14px; margin: 0; background: #e2e8f0; color: #334155; padding: 0;">초기화</button>
                </div>
            </div>
        </section>

        <section id="tab-schedule" class="tab-content">
            <div class="section-header">
                <h2>📅 데일리 코스</h2>
                <div style="display: flex; gap: 6px; margin-bottom: 20px; width: 100%;">
                    <button class="btn-base mini-btn blue tab-btn" onclick="promptSavePlan()"><i class="fa-solid fa-floppy-disk" style="margin-right:4px;"></i>저장</button>
                    <button class="btn-base mini-btn gray tab-btn" onclick="toggleSavedPlans()"><i class="fa-solid fa-folder-open" style="margin-right:4px;"></i>보관함</button>
                    <button class="btn-base mini-btn red tab-btn" onclick="resetScheduleScreen()"><i class="fa-solid fa-eraser" style="margin-right:4px;"></i>초기화</button>
                </div>
                <div id="saved-plans-list" class="plan-list-box"></div>
            </div>
            <div id="tips-food-container" style="display: none; margin-bottom: 25px;"></div>
            <div id="schedule-container">
                <div style="text-align: center; padding: 60px 0; color: var(--text-sub); font-size: 14px;">설정 탭에서 일정을 생성해주세요.</div>
            </div>
        </section>

        <section id="tab-budget" class="tab-content">
            <div class="section-header"><h2>💸 지출 관리</h2></div>
            <div class="budget-summary card" style="background: linear-gradient(135deg, var(--primary), var(--secondary)); color:white;">
                <div class="budget-row"><span>총 예산</span><strong id="display-budget">0 원</strong></div>
                <div class="budget-row"><span>사용 금액</span><strong id="used-budget">0 원</strong></div>
                <div class="budget-row total" style="border-top:1px solid rgba(255,255,255,0.2); padding-top:10px;"><span>남은 예산</span><strong id="remaining-budget">0 원</strong></div>
            </div>
            <div class="card">
                <h3>지출 추가</h3>
                <input type="text" id="expense-name" placeholder="내역">
                <div style="display:flex; gap:10px; margin: 10px 0;">
                    <input type="number" id="expense-amount" placeholder="금액" style="flex:2;">
                    <select id="expense-currency" style="flex:1;">
                        <option value="KRW">KRW</option><option value="THB">THB</option><option value="JPY">JPY</option><option value="USD">USD</option>
                    </select>
                </div>
                <button class="btn-base primary-btn" onclick="addExpense()" style="height: 50px;">저장하기</button>
            </div>
            <div class="card" id="expense-history" style="display: none;"><div id="expense-list-content"></div></div>
        </section>

        <section id="tab-pack" class="tab-content">
            <div class="section-header"><h2>🎒 준비물</h2></div>
            <div class="card" id="pack-container">
                <div id="pack-add-box" style="display: flex; gap: 8px;">
                    <input type="text" id="pack-input" placeholder="준비물 추가" style="margin:0; height: 42px;">
                    <button onclick="addPackItem()" class="btn-base primary-btn" style="width: 42px; height: 42px; padding:0;"><i class="fa-solid fa-plus"></i></button>
                </div>
            </div>
            <button class="btn-base primary-btn" onclick="syncPackData()" style="height: 50px;">서버 동기화</button>
        </section>

        <section id="tab-spots" class="tab-content">
            <div class="section-header"><h2>📸 큐레이션</h2></div>
            <div id="spots-container"></div>
            <button class="btn-base primary-btn" onclick="document.getElementById('camera-input').click()" style="margin: 20px 0; height: 50px;"><i class="fa-solid fa-camera" style="margin-right:8px;"></i>사진 촬영</button>
            <input type="file" id="camera-input" accept="image/*" capture="environment" style="display: none;" onchange="handlePhotoUpload(event)">
            <div id="photo-gallery" class="photo-grid"></div>
        </section>
    </main>

    <nav class="bottom-nav">
        <button class="nav-item active" onclick="switchTab('tab-home', this)"><i class="fa-solid fa-house"></i><span>설정</span></button>
        <button class="nav-item" onclick="switchTab('tab-schedule', this)"><i class="fa-regular fa-calendar-check"></i><span>일정</span></button>
        <button class="nav-item" onclick="switchTab('tab-budget', this)"><i class="fa-solid fa-calculator"></i><span>예산</span></button>
        <button class="nav-item" onclick="switchTab('tab-pack', this)"><i class="fa-solid fa-suitcase"></i><span>준비물</span></button>
        <button class="nav-item" onclick="switchTab('tab-spots', this)"><i class="fa-solid fa-map-location-dot"></i><span>명소</span></button>
    </nav>

    <div id="guide-modal" class="modal-overlay" onclick="if(event.target===this) this.style.display='none'">
        <div class="modal-content">
            <h3 style="color:var(--primary-dark); font-weight:800; margin-top:0;">여행지 추가 절차 🚀</h3>
            <p style="font-size:14px; line-height:1.6; color:var(--text-main);">
                1. 계획을 엑셀로 정리<br>
                2. 제이에게 JSON 변환 요청<br>
                3. 구글 시트 <b>Library</b> 탭에 복사<br>
                4. A열에 '도시_일수' 명칭 입력<br>
                5. 앱에서 일정 생성 클릭!
            </p>
            <button class="btn-base primary-btn" onclick="document.getElementById('guide-modal').style.display='none'" style="height:40px;">확인</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/ko.js"></script>
    <script src="app.js"></script>
</body>
</html>
