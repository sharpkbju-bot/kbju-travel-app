<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>K&S의 여행 스토리</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        /* 카드 제목 컬러 및 볼드 처리 */
        .section-header h2, .card h3, .setup-card h3 {
            color: #2D9CDB !important;
            font-weight: 800 !important;
            margin-bottom: 12px;
        }
        /* 버튼 슬림 및 세련된 스타일 통일 */
        .primary-btn, .secondary-btn, .camera-btn {
            padding: 10px 14px !important;
            border-radius: 8px !important;
            font-size: 14px !important;
            font-weight: 700 !important;
            line-height: 1.4 !important;
            height: auto !important;
            box-sizing: border-box;
        }
    </style>
</head>
<body>
    <div id="loading">
        <div class="spinner"></div>
        <div id="loadingText" style="font-weight:800; color:#2D9CDB;">데이터 분석 중...</div>
    </div>
    
    <header class="app-header">
        <h1 id="header-title">K&S 여행 스토리</h1>
        <div class="header-actions">
            <button class="icon-btn" onclick="fetchServerData()"><i class="fa-solid fa-rotate-right"></i></button>
        </div>
    </header>
    
    <main id="app-main">
        <section id="tab-home" class="tab-content active">
            <div class="welcome-banner">
                <h2>데이터 기반 최적화<br>맞춤형 여행 설계 ✈️</h2>
                <p>구글 시트 라이브러리와 AI가 결합된 최신 정보를 제공합니다.</p>
            </div>
            
            <div id="weather-info-card" class="weather-card" style="display: none;"></div>
            
            <div class="card setup-card">
                <h3>기본 여행 설정</h3>
                <div class="input-group">
                    <label>🌍 상세 여행 목적지</label>
                    <input type="text" id="travel-location" placeholder="예: 일본 오사카" onchange="updateWeatherInfo()">
                </div>
                
                <div class="input-group">
                    <label>👨‍👩‍👧‍👦 여행 구성원 (세분화)</label>
                    <select id="travel-type">
                        <option value="">구성원을 선택해주세요</option>
                        <option value="혼자">혼자</option>
                        <option value="연인">연인</option>
                        <option value="친구들">친구들</option>
                        <option value="2030부부">20~30대 부부</option>
                        <option value="4050부부">40~50대 부부</option>
                        <option value="60부부">60대 이상 부부</option>
                        <option value="가족_성인">성인 자녀 동반 4인 이상 가족</option>
                        <option value="가족_청소년">청소년 이하 자녀 포함 가족</option>
                    </select>
                </div>
                
                <div class="input-group row-group">
                    <div class="half-input">
                        <label>👥 총 인원 수</label>
                        <div style="position: relative; display: flex; align-items: center;">
                            <input type="number" id="travel-members" placeholder="0" style="text-align: right; padding-right: 30px; width: 100%; box-sizing: border-box;">
                            <span style="position: absolute; right: 12px; color: var(--text-sub); font-size: 14px;">명</span>
                        </div>
                    </div>
                    <div class="half-input">
                        <label>💰 예산 범위 (원)</label>
                        <input type="number" id="travel-budget" placeholder="예: 2000000">
                    </div>
                </div>
                
                <div class="input-group">
                    <label>📅 여행 기간 선택</label>
                    <input type="text" id="travel-dates" placeholder="시작일 ~ 종료일 선택" readonly>
                </div>
                
                <div class="input-group">
                    <label>📍 여행 테마</label>
                    <select id="travel-destination">
                        <option value="">테마를 선택해주세요</option>
                        <option value="relax">휴양 (호캉스, 스파)</option>
                        <option value="tour">관광 (명소, 랜드마크)</option>
                        <option value="food">맛집 탐방 (로컬 푸드)</option>
                        <option value="activity">액티비티 (스포츠, 체험)</option>
                    </select>
                </div>
                
                <div class="input-group">
                    <label>🏨 예약한 숙소 정보</label>
                    <div style="display: flex; gap: 6px;">
                        <input type="text" id="travel-accommodation" placeholder="숙소 이름 또는 위치" style="flex: 1;">
                        <button class="secondary-btn" style="width: auto; background:#fff0f3; color:#ff4757; border:none;" onclick="recommendHotels()">AI 추천</button>
                    </div>
                    <div id="hotel-recommend-box" style="margin-top:10px; display:none;"></div>
                </div>
                
                <div class="input-group">
                    <label>⏰ 출발 시간 & 추가요청사항</label>
                    <input type="time" id="travel-departure" style="margin-bottom: 6px;">
                    <input type="text" id="travel-requests" placeholder="예: 부모님이 걷기 편한 동선으로 짜주세요" style="width: 100%; box-sizing: border-box;">
                </div>
                
                <input type="hidden" id="travel-days" value="">
                
                <div style="display: flex; gap: 8px; margin-top: 15px;">
                    <button class="primary-btn" onclick="generatePlan(false)" style="flex: 1;">✨ 일정 생성</button>
                    <button class="secondary-btn" onclick="generatePlan(true)" style="flex: 1; background: #e9ecef; color: #495057; border: none;">🔄 다시 생성</button>
                </div>
            </div>
        </section>

        <section id="tab-schedule" class="tab-content">
            <div class="section-header">
                <h2>📅 데일리 코스</h2>
                <div style="display: flex; gap: 8px; margin-top: 15px; margin-bottom: 25px;">
                    <button class="secondary-btn" onclick="promptSavePlan()" style="flex: 1; background: var(--primary-light); color: var(--primary);"><i class="fa-solid fa-floppy-disk"></i> 저장</button>
                    <button class="secondary-btn" onclick="toggleSavedPlans()" style="flex: 1;"><i class="fa-solid fa-folder-open"></i> 보관함</button>
                    <button class="secondary-btn" onclick="resetApp()" style="flex: 1; background: #ffe5e5; color: var(--danger); border:none;"><i class="fa-solid fa-rotate-right"></i> 비우기</button>
                </div>
                <div id="saved-plans-list" class="plan-list-box"></div>
            </div>
            <div id="tips-food-container" style="display: none; margin-bottom: 25px;"></div>
            <div id="schedule-container"></div>
        </section>

        <section id="tab-budget" class="tab-content">
            <div class="section-header"><h2>💸 지출 관리</h2></div>
            <div class="budget-summary card">
                <div class="budget-row"><span>총 예산</span><strong id="display-budget">0 원</strong></div>
                <div class="budget-row"><span>사용 금액</span><strong class="text-danger" id="used-budget">0 원</strong></div>
                <div class="budget-row total"><span>남은 예산</span><strong class="text-primary" id="remaining-budget">0 원</strong></div>
            </div>
            <div class="card">
                <h3>지출 내역 추가</h3>
                <div class="input-group"><input type="text" id="expense-name" placeholder="내역"></div>
                <div class="input-group row-group">
                    <input type="number" id="expense-amount" placeholder="금액" class="half-input">
                    <select id="expense-currency" class="half-input">
                        <option value="KRW">KRW</option><option value="USD">USD</option><option value="JPY">JPY</option>
                    </select>
                </div>
                <button class="primary-btn" onclick="addExpense()" style="width:100%;">저장</button>
            </div>
            <div class="card" id="expense-history" style="display: none;"><div id="expense-list-content"></div></div>
        </section>

        <section id="tab-pack" class="tab-content">
            <div class="section-header"><h2>🎒 준비물</h2></div>
            <div class="card checklist-card" id="pack-container">
                <div class="add-item-box" id="pack-add-box" style="display: flex; gap: 8px; width: 100%; box-sizing: border-box; align-items: center;">
                    <input type="text" id="pack-input" placeholder="준비물 추가..." style="flex: 1; height: 42px; margin: 0; padding: 0 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 14px;">
                    <button onclick="addPackItem()" style="flex-shrink: 0; width: 42px; height: 42px; display: flex; justify-content: center; align-items: center; background: #2D9CDB; color: white; border: none; border-radius: 8px; margin: 0; padding: 0;"><i class="fa-solid fa-plus"></i></button>
                </div>
            </div>
            <button class="primary-btn" onclick="syncPackData()" style="width:100%;">서버 동기화</button>
        </section>

        <section id="tab-spots" class="tab-content">
            <div class="section-header"><h2>📸 큐레이션 & 갤러리</h2></div>
            <div id="spots-container"></div>
            <input type="file" id="camera-input" accept="image/*" capture="environment" style="display: none;" onchange="handlePhotoUpload(event)">
            <button class="camera-btn primary-btn" onclick="document.getElementById('camera-input').click()" style="width: 100%; margin-top: 15px;"><i class="fa-solid fa-camera"></i> 사진 촬영 및 저장</button>
            <div id="photo-gallery" class="photo-grid" style="margin-top: 15px;"></div>
        </section>
    </main>

    <nav class="bottom-nav">
        <button class="nav-item active" onclick="switchTab('tab-home', this)"><i class="fa-solid fa-house"></i><span>설정</span></button>
        <button class="nav-item" onclick="switchTab('tab-schedule', this)"><i class="fa-regular fa-calendar-check"></i><span>일정</span></button>
        <button class="nav-item" onclick="switchTab('tab-budget', this)"><i class="fa-solid fa-calculator"></i><span>예산</span></button>
        <button class="nav-item" onclick="switchTab('tab-pack', this)"><i class="fa-solid fa-suitcase"></i><span>준비물</span></button>
        <button class="nav-item" onclick="switchTab('tab-spots', this)"><i class="fa-solid fa-map-location-dot"></i><span>명소</span></button>
    </nav>

    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/ko.js"></script>
    <script src="app.js"></script>
</body>
</html>
